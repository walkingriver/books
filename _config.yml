# GitHub Pages Configuration for Michael D. Callaghan Books

title: Michael D. Callaghan
description: Books on career growth, communication, and software development
author: Michael D. Callaghan
url: https://walkingriver.github.io
baseurl: /books

# Build settings
markdown: kramdown
highlighter: rouge

# Theme (using no theme - custom HTML/CSS)
theme: null

# Exclude from processing
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock

# Default YAML front matter for pages
defaults:
  - scope:
      path: ""
    values:
      layout: null

# SEO and social
twitter:
  username: walkingriver
social:
  name: Michael D. Callaghan
  links:
    - https://twitter.com/walkingriver
    - https://walkingriver.com
